<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AREW Homepage</title>
  <link rel="stylesheet" href="../../style.css" />

  <!-- フォント（Google Sitesっぽく Lato 系） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- 固定ヘッダー -->
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a class="brand" href="#">AREW 2023</a>

      <!-- PCナビ -->
      <nav class="nav nav--pc" aria-label="グローバルナビゲーション">
        <a href="./past_2023_home.html" class="nav__link">Home</a>
        <a href="./past_2023_Access.html" class="nav__link">Access</a>
        <a href="./past_2023_home.html" class="nav__link">Application</a>
        <a href="./past_2023_program.html" class="nav__link">Program</a>
        <a href="./past_2023_admin.html" class="nav__link">Administrative Office</a>
      </nav>

      <!-- 検索（見た目だけでも可） -->
      <div class="search">
        <input id="siteSearch" type="search" placeholder="このサイトを検索" aria-label="このサイトを検索">
      </div>

      <!-- モバイル：ハンバーガー
      <button class="hamburger" id="hamburger" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div> -->

    <!-- モバイルメニュー -->
    <nav class="nav nav--mobile" id="mobileNav" aria-label="モバイルナビゲーション">
        <a href="./past_2023_home.html" class="nav__link">Home</a>
        <a href="./past_2023_Access.html" class="nav__link">Access</a>
        <a href="./past_2023_application.html" class="nav__link">Application</a>
        <a href="./past_2023_program.html" class="nav__link">Program</a>
        <a href="./past_2023_admin.html" class="nav__link">Administrative Office</a>
    </nav>
  </header>

  <!-- ヒーロー（Google Sitesっぽい大きい背景画像＋オーバーレイ） -->
  <section id="home" class="hero" aria-label="トップ">
    <div class="hero__bg" style="background-image:url('assets/hero.jpg');"></div>
    <div class="hero__overlay"></div>
    <div class="hero__inner">
      <h1 class="hero__title">第1回 応用地域経済学ワークショップ</h1>
      <h2 class="hero__subtitle">Applied Regional Economics Workshop 2023</h2>
    </div>
  </section>

  <main class="container">
  
    <!-- Home -->
    <section class="section" id="news" data-searchable>
      <h2 class="section__title section__title--green">事務局</h2>
      <ul class="news">
        <li>黒田雄太（大阪公立大学）</li>
        <li>菅澤武尊（日本住宅総合センター）</li>
        <li>野村魁（山梨英和大学）</li>
        <li>安田昌平（日本大学）</li>
        <li>吉田惇（東北学院大学）</li>
      </ul>

    </section>

  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <small>© Seminar / Workshop</small>
    </div>
  </footer>

  <script>
    // モバイルメニュー
    const btn = document.getElementById('hamburger');
    const nav = document.getElementById('mobileNav');
    btn?.addEventListener('click', () => {
      const open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', String(open));
    });

    // （任意）簡易サイト内検索：data-searchable 内を絞り込み
    const q = document.getElementById('siteSearch');
    q?.addEventListener('input', () => {
      const keyword = q.value.trim().toLowerCase();
      document.querySelectorAll('[data-searchable]').forEach(sec => {
        const text = sec.innerText.toLowerCase();
        sec.style.display = (!keyword || text.includes(keyword)) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
