<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AREW Homepage</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a class="brand" href="2026_home.html">AREW 2026</a>

    <nav class="nav nav--mobile" id="mobileNav" aria-label="モバイルナビゲーション">
      <a href="../../index.html" class="nav__link">Home</a>
      <a href="2026_home.html" class="nav__link">Workshop</a>
      <a href="2026_Access.html" class="nav__link">Access</a>
      <a href="2026_application.html" class="nav__link">Application</a>
      <a href="2026_program.html" class="nav__link">Program</a>
      <a href="2026_admin.html" class="nav__link">Administrative Office</a>
    </nav>
  </header>

    <!-- ヒーロー（Google Sitesっぽい大きい背景画像＋オーバーレイ） -->
  <section id="home" class="hero" aria-label="トップ">
    <div class="hero__bg" style="background-image:url('assets/hero.jpg');"></div>
    <div class="hero__overlay"></div>
    <div class="hero__inner">
      <h1 class="hero__title">第4回 応用地域経済学ワークショップ</h1>
      <h2 class="hero__subtitle">Applied Regional Economics Workshop 2026</h2>
    </div>
  </section>

    <main class="container">
    <section class="section" id="program" data-searchable>
        <h2 class="section__title section__title--green">プログラム</h2>

        <div style="border:1px solid var(--line); border-radius:12px; overflow:hidden; min-height:78vh; background:var(--panel);">
            <iframe  src="https://docs.google.com/gview?embedded=1&url=https%3A%2F%2Fdl.dropboxusercontent.com%2Fscl%2Ffi%2Fd72drnx62cp9w068tcepl%2F2023AREW_.pdf%3Frlkey%3D0eb1vs4vkvgehvaxyt8a37c2p%26raw%3D1"
                     title="2023プログラム"
                     style="width:100%; height:78vh; border:0;"
                    loading="lazy">
            </iframe>
        </div>

        <!-- 任意：埋め込みが効かないブラウザ向けの保険リンク -->
        <p class="muted" style="margin-top:.6rem;">
        うまく表示されない場合は
        <a href="https://www.dropbox.com/scl/fi/d72drnx62cp9w068tcepl/2023AREW_.pdf?rlkey=0eb1vs4vkvgehvaxyt8a37c2p&dl=0"
            target="_blank" rel="noopener">こちら</a>
        から開いてください。
        </p>

        <h2>セッション</h2>
        <p>アイデアセッション:20分(フロアディスカッション含む)</p>
        <p>通常報告:30分(発表20分およびフロアディスカッション10分)</p>
    </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <small>AREW Workshop</small>
      </div>
    </footer>

  <script>
    const btn = document.getElementById('hamburger');
    const nav = document.getElementById('mobileNav');
    btn?.addEventListener('click', () => {
      const open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', String(open));
    });
  </script>
</body>
</html>
