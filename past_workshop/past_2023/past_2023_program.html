<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AREW 2023 Program</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a class="brand" href="./past_2023_home.html">AREW 2023</a>
      <nav class="nav nav--pc" aria-label="グローバルナビゲーション">
        <a href="./past_2023_home.html" class="nav__link">Home</a>
        <a href="./past_2023_Access.html" class="nav__link">Access</a>
        <a href="./past_2023_application.html" class="nav__link">Application</a>
        <a href="./past_2023_program.html" class="nav__link">Program</a>
        <a href="./past_2023_admin.html" class="nav__link">Administrative Office</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="nav nav--mobile" id="mobileNav" aria-label="モバイルナビゲーション">
      <a href="./past_2023_home.html" class="nav__link">Home</a>
      <a href="./past_2023_Access.html" class="nav__link">Access</a>
      <a href="./past_2023_application.html" class="nav__link">Application</a>
      <a href="./past_2023_program.html" class="nav__link">Program</a>
      <a href="./past_2023_admin.html" class="nav__link">Administrative Office</a>
    </nav>
  </header>

  <main class="container">
    <section class="section" id="program" data-searchable>
      <h2 class="section__title section__title--green">2023 Program</h2>
      <div style="border:1px solid var(--line); border-radius:12px; overflow:hidden; min-height:78vh; background:var(--panel);">
        <iframe
          src="./2023プログラム.pdf"
          title="2023プログラム"
          style="width:100%; height:78vh; border:0;"
          loading="lazy"
        ></iframe>
      </div>
    </section>
  </main>

  <script>
    const btn = document.getElementById('hamburger');
    const nav = document.getElementById('mobileNav');
    btn?.addEventListener('click', () => {
      const open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', String(open));
    });
  </script>
</body>
</html>
