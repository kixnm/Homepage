<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AREW Homepage</title>
  <link rel="stylesheet" href="../../style.css" />

  <!-- フォント（Google Sitesっぽく Lato 系） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- 固定ヘッダー -->
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a class="brand" href="#">AREW 2024</a>

      <!-- PCナビ -->
      <nav class="nav nav--pc" aria-label="グローバルナビゲーション">
        <a href="../../index.html" class="nav__link">Home</a>
        <a href="./2024_home.html" class="nav__link">Workshop</a>
        <a href="./2024_Access.html" class="nav__link">Access</a>
        <a href="./2024_application.html" class="nav__link">Application</a>
        <a href="./2024_program.html" class="nav__link">Program</a>
        <a href="./2024_admin.html" class="nav__link">Administrative Office</a>
        <div class="dropdown">
          <button class="nav__link dropdown__toggle" type="button" aria-expanded="false">
            Past workshop
          </button>
          <div class="dropdown__menu">
            <a href="../2023/2023_home.html" class="dropdown__item">第1回(2023)</a>
            <a href="../2024/2024_home.html" class="dropdown__item">第2回(2024)</a>
            <a href="../2025/2025_home.html" class="dropdown__item">第3回(2025)</a>
          </div>
        </div>
      </nav>

    <button class="hamburger" id="hamburger" aria-label="メニューを開く" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    </div>
    
    <nav class="nav nav--mobile" id="mobileNav" aria-label="モバイルナビゲーション">
      <a href="index.html" class="nav__link">Home</a>
    <a href="2026_home.html" class="nav__link">Workshop</a>
    <a href="../2023/2023_home.html" class="nav__link">第1回(2023)</a>
    <a href="../2024/2024_home.html" class="nav__link">第2回(2024)</a>
    <a href="../2025/2025_home.html" class="nav__link">第3回(2025)</a>
    </nav>
  </header>

  <!-- ヒーロー（Google Sitesっぽい大きい背景画像＋オーバーレイ） -->
  <section id="home" class="hero" aria-label="トップ">
    <div class="hero__bg" style="background-image:url('assets/hero.jpg');"></div>
    <div class="hero__overlay"></div>
    <div class="hero__inner">
      <h1 class="hero__title">第2回 応用地域経済学ワークショップ</h1>
      <h2 class="hero__subtitle">Applied Regional Economics Workshop 2024</h2>
    </div>
  </section>

  <main class="container">
  
    <!-- Home -->
    <section class="section" id="news" data-searchable>
      <h2 class="h2-section">会場</h2>
      <ul class="news">
        <li>
          会場
        <p>京都産業大学(京都府京都市北区上賀茂本山)</p>
        <p><u><b>5号館5405教室</b></u></p>
        </li>
    </section>

    <!-- Official Access -->
    <section class="OfficialAccess" id="OfficialAccess" data-searchable>
      <h2 class="h2-section">会場までのアクセス</h2>
      <a href="https://www.kyoto-su.ac.jp/access/">交通アクセス</a>
    </section>

    <!-- Google map -->
    <section class="GoogleMap" id="Googlemap">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d353.2919996199598!2d135.7566001099914!3d35.071370542319336!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6001a7ddbb804e83%3A0xc53a1e9e9e89a0cd!2z5Lqs6YO955Sj5qWt5aSn5a2m!5e0!3m2!1sja!2sjp!4v1772852445048!5m2!1sja!2sjp" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </section>  
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <small>AREW Workshop</small>
    </div>
  </footer>

  <script>
    // モバイルメニュー
    const btn = document.getElementById('hamburger');
    const nav = document.getElementById('mobileNav');

    btn?.addEventListener('click', () => {
      const open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', String(open));
    });

    // （任意）簡易サイト内検索：data-searchable 内を絞り込み
    const q = document.getElementById('siteSearch');
    q?.addEventListener('input', () => {
      const keyword = q.value.trim().toLowerCase();
      document.querySelectorAll('[data-searchable]').forEach(sec => {
        const text = sec.innerText.toLowerCase();
        sec.style.display = (!keyword || text.includes(keyword)) ? '' : 'none';
      });
    });
  </script>

  <script>
    const toggle = document.querySelector('.dropdown__toggle');
    const menu = document.querySelector('.dropdown__menu');

    toggle?.addEventListener('click', () => {
      const isOpen = menu.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', String(isOpen));
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        menu?.classList.remove('is-open');
        toggle?.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
